<style>
        body {

        }
        .gold-gradient {
            background: linear-gradient(135deg, #e8c17f 0%, #c9a465 100%);
        }
        .shimmer {
            position: relative;
            overflow: hidden;
        }
        .shimmer::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                to bottom right,
                rgba(255, 255, 255, 0) 0%,
                rgba(255, 255, 255, 0) 40%,
                rgba(255, 255, 255, 0.4) 50%,
                rgba(255, 255, 255, 0) 60%,
                rgba(255, 255, 255, 0) 100%
            );
            transform: rotate(45deg);
            pointer-events: none;
        }
        .decorative-wave {
            position: absolute;
            width: 600px;
            height: 600px;
            pointer-events: none;
            opacity: 0.15;
            background-size: contain;
            background-repeat: no-repeat;
        }
        .wave-top-left {
            top: -200px;
            left: -200px;
            transform: rotate(-15deg);
        }
        .wave-bottom-right {
            bottom: -200px;
            right: -200px;
            transform: rotate(165deg);
        }
        input:focus {
            outline: none;
            border-bottom: 1px solid #e8c17f !important;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
